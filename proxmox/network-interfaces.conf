# =============================================================================
# Proxmox VE  /etc/network/interfaces   — HomeSOClab
# -----------------------------------------------------------------------------
# VLAN-aware bridge design:
#   * enp1s0 = management/uplink physical NIC  -> vmbr0 (Proxmox host mgmt)
#   * enp2s0 = lab trunk physical NIC          -> vmbr1 (VLAN-aware, 802.1Q)
#
# If you only have ONE physical NIC, put vmbr1 (VLAN-aware) on it and give the
# Proxmox host an IP on the VLAN-10 sub-interface (see the single-NIC variant
# at the bottom, commented out).
#
# Apply with:  ifreload -a     (Proxmox uses ifupdown2)
# Verify with: ip -d link show vmbr1 | grep vlan_filtering   (=> vlan_filtering 1)
# =============================================================================

auto lo
iface lo inet loopback

# --- Physical NICs (no IP; they are bridge members) ---
auto enp1s0
iface enp1s0 inet manual

auto enp2s0
iface enp2s0 inet manual

# --- vmbr0 : Proxmox host management bridge -------------------------------
# Carries the Proxmox web UI / SSH. Lives on the Management VLAN (10).
auto vmbr0
iface vmbr0 inet static
    address 10.10.10.2/24
    gateway 10.10.10.1
    bridge-ports enp1s0
    bridge-stp off
    bridge-fd 0
#   Management plane for the hypervisor itself.

# --- vmbr1 : VLAN-aware lab trunk bridge ----------------------------------
# Single bridge carrying VLANs 10/20/30/99 as 802.1Q tags. VM vNICs select
# their VLAN via the per-NIC "tag" field (qm set ... -netX ...,tag=20).
# pfSense's trunk vNIC attaches here untagged-aware and terminates all VLANs.
auto vmbr1
iface vmbr1 inet manual
    bridge-ports enp2s0
    bridge-stp off
    bridge-fd 0
    bridge-vlan-aware yes
    bridge-vids 10,20,30,99
#   vlan-aware = let guests carry any of the listed VLAN tags.
#   No IP on this bridge: the host does not participate in lab L2 directly.

# =============================================================================
# OPTIONAL: dedicated mirror/SPAN sink port for the SIEM sensor
# -----------------------------------------------------------------------------
# A separate bridge with no uplink, used purely as the destination for the
# tc-based traffic mirror (see ../proxmox/bridge-mirror.md). The sensor's
# monitor NIC attaches here; mirrored frames are pushed in by `tc`.
# auto vmbr9
# iface vmbr9 inet manual
#     bridge-ports none
#     bridge-stp off
#     bridge-fd 0
# =============================================================================

# =============================================================================
# SINGLE-NIC VARIANT (uncomment this block and remove vmbr0/enp2s0 above if
# your host has only one physical NIC, e.g. enp1s0):
#
# auto vmbr1
# iface vmbr1 inet manual
#     bridge-ports enp1s0
#     bridge-stp off
#     bridge-fd 0
#     bridge-vlan-aware yes
#     bridge-vids 10,20,30,99
#
# auto vmbr1.10
# iface vmbr1.10 inet static
#     address 10.10.10.2/24
#     gateway 10.10.10.1
#     # Proxmox host management rides VLAN 10 on the same trunk.
# =============================================================================
